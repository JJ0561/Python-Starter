kind = "web"
previewPath = "/"
title = "Orion Family Hub"
version = "1.0.0"
id = "artifacts/orion-hub"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18627

[services.development]
run = "pnpm --filter @workspace/orion-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orion-hub", "run", "build" ]
serve = "static"
publicDir = "artifacts/orion-hub/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18627"
BASE_PATH = "/"
